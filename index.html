<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pointage Pro Sync</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --text: #1A1A18; --text2: #6B6B65;
    --green: #2D7D52; --green-bg: #E8F5EE; --red: #B53A2F; --red-bg: #FBE9E8;
    --border: rgba(0,0,0,0.08); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
  .screen { display: none; height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }
  .topbar { padding: 50px 24px 15px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .content { flex: 1; overflow-y: auto; padding: 20px; }
  .btn { padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); font-weight: 600; width: 100%; cursor: pointer; font-size: 16px; transition: 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-green { background: var(--green); color: white; }
  .btn-red { background: var(--red); color: white; }
  .emp-card { background: var(--surface); padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
  .avatar { width: 45px; height: 45px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
  .action-box { padding: 25px; border-radius: var(--radius); text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
  .big-time { font-family: 'DM Mono', monospace; font-size: 40px; margin: 10px 0; }
  .sync-indicator { font-size: 12px; color: var(--green); text-align: center; padding: 5px; background: #fff; display: none; }
  .loader { border: 2px solid #f3f3f3; border-top: 2px solid var(--green); border-radius: 50%; width: 14px; height: 14px; display: inline-block; animation: spin 1s linear infinite; margin-right: 5px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="sync-banner" class="sync-indicator"><div class="loader"></div> Synchro Google Sheets...</div>

<div id="screen-home" class="screen active">
  <div class="topbar">
    <div><h1 id="h-title">Pointage</h1><p id="h-date" style="font-size:12px; color:var(--text2)"></p></div>
    <button onclick="show('screen-admin')" style="border:none; background:none; font-size:20px">⚙️</button>
  </div>
  <div class="content" id="emp-list"></div>
</div>

<div id="screen-pointer" class="screen">
  <div class="topbar"><button onclick="show('screen-home')" style="border:none; background:none; font-size:18px">← Retour</button></div>
  <div class="content">
    <h2 id="p-name" style="margin-bottom:20px">Nom</h2>
    <div id="p-box" class="action-box">
      <p id="p-status">Chargement...</p>
      <div class="big-time" id="p-clock">00:00:00</div>
      <p id="p-total" style="font-size:14px; color:var(--text2)">Total semaine : --h--</p>
    </div>
    <button id="p-btn" class="btn" onclick="prepareAction()">Action</button>
  </div>
</div>

<div id="screen-admin" class="screen">
  <div class="topbar"><h1>Admin</h1><button onclick="show('screen-home')" style="border:none; background:none">✕</button></div>
  <div class="content">
    <input type="text" id="new-emp" placeholder="Nom de l'employé" class="btn" style="margin-bottom:10px; text-align:left">
    <button class="btn btn-green" onclick="addEmp()">+ Ajouter</button>
    <hr style="margin:20px 0; opacity:0.2">
    <div id="admin-list"></div>
  </div>
</div>

<script>
const CONFIG = {
  URL: 'https://script.google.com/macros/s/AKfycbzLM0EuRt17oJCJssYQFx7qq3qFZii4SFEWbeuIA1-n0rBzsTg3UIakr3OQq8_jxApA/exec', // <--- METS TON URL ICI
  KEY: 'pointage_v2'
};

let state = { emps: [], entries: [] };
let currentEmp = null;

// Chargement initial
function load() {
  const local = localStorage.getItem(CONFIG.KEY);
  if (local) state = JSON.parse(local);
  syncFromCloud();
}

function save() {
  localStorage.setItem(CONFIG.KEY, JSON.stringify(state));
}

// Synchro avec Google
async function syncFromCloud() {
  if (CONFIG.URL.includes('TON_URL')) return;
  document.getElementById('sync-banner').style.display = 'block';
  try {
    const res = await fetch(CONFIG.URL);
    const data = await res.json();
    if (data) {
      // On fusionne intelligemment : le Cloud est la référence
      state.entries = data.map(d => ({
        empId: state.emps.find(e => e.name === d.employe)?.id || 'unknown',
        type: d.type === 'Arrivée' ? 'in' : 'out',
        ts: new Date(d.date + ' ' + d.heure).getTime()
      })).filter(e => e.empId !== 'unknown');
      save();
    }
  } catch (e) { console.error("Erreur sync", e); }
  document.getElementById('sync-banner').style.display = 'none';
  renderHome();
}

// Logique métier
function getWeekMinutes(empId) {
  const now = new Date();
  const startOfWeek = new Date(now.setDate(now.getDate() - now.getDay() + 1)).setHours(0,0,0,0);
  const es = state.entries.filter(e => e.empId === empId && e.ts >= startOfWeek).sort((a,b)=>a.ts-b.ts);
  let total = 0, lastIn = null;
  es.forEach(e => {
    if(e.type === 'in') lastIn = e.ts;
    else if(lastIn) { total += (e.ts - lastIn); lastIn = null; }
  });
  return Math.floor(total / 60000);
}

function renderHome() {
  const list = document.getElementById('emp-list');
  document.getElementById('h-date').innerText = new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
  list.innerHTML = state.emps.map(e => {
    const isPresent = state.entries.filter(ent => ent.empId === e.id).slice(-1)[0]?.type === 'in';
    return `
      <div class="emp-card" onclick="openPointer('${e.id}')">
        <div class="avatar" style="background:${isPresent?'var(--green-bg)':'#eee'}; color:${isPresent?'var(--green)':'#666'}">
          ${e.name.charAt(0)}
        </div>
        <div style="flex:1">
          <div style="font-weight:600">${e.name}</div>
          <div style="font-size:12px; color:var(--text2)">${isPresent?'En poste':'Absent'}</div>
        </div>
      </div>`;
  }).join('');
}

function openPointer(id) {
  currentEmp = state.emps.find(e => e.id === id);
  document.getElementById('p-name').innerText = currentEmp.name;
  const last = state.entries.filter(e => e.empId === id).slice(-1)[0];
  const isPresent = last?.type === 'in';
  const box = document.getElementById('p-box');
  const btn = document.getElementById('p-btn');
  
  box.style.background = isPresent ? 'var(--red-bg)' : 'var(--green-bg)';
  document.getElementById('p-status').innerText = isPresent ? 'Travail en cours...' : 'Prêt à commencer';
  document.getElementById('p-total').innerText = `Total semaine : ${Math.floor(getWeekMinutes(id)/60)}h${(getWeekMinutes(id)%60).toString().padStart(2,'0')}`;
  
  btn.innerText = isPresent ? 'Terminer ma journée' : 'Commencer ma journée';
  btn.className = isPresent ? 'btn btn-red' : 'btn btn-green';
  
  show('screen-pointer');
}

async function prepareAction() {
  const last = state.entries.filter(e => e.empId === currentEmp.id).slice(-1)[0];
  const type = last?.type === 'in' ? 'out' : 'in';
  const now = new Date();
  
  const entry = { empId: currentEmp.id, type, ts: now.getTime() };
  state.entries.push(entry);
  save();

  // Envoi Google
  const data = {
    date: now.toISOString().split('T')[0],
    employe: currentEmp.name,
    type: type === 'in' ? 'Arrivée' : 'Départ',
    heure: now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0'),
    duree: type === 'out' ? Math.floor((now.getTime() - last.ts)/60000) : 0
  };

  show('screen-home');
  fetch(CONFIG.URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
    .then(() => syncFromCloud());
}

function addEmp() {
  const name = document.getElementById('new-emp').value;
  if (!name) return;
  state.emps.push({ id: 'e' + Date.now(), name });
  save();
  document.getElementById('new-emp').value = '';
  renderAdmin();
}

function renderAdmin() {
  document.getElementById('admin-list').innerHTML = state.emps.map(e => `
    <div class="emp-card">
      <div style="flex:1">${e.name}</div>
      <button onclick="delEmp('${e.id}')" style="color:red; border:none; background:none">Supprimer</button>
    </div>
  `).join('');
}

function delEmp(id) {
  state.emps = state.emps.filter(e => e.id !== id);
  save(); renderAdmin();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-home') renderHome();
  if(id === 'screen-admin') renderAdmin();
}

setInterval(() => {
  const t = new Date().toLocaleTimeString('fr-FR');
  document.getElementById('p-clock').innerText = t;
}, 1000);

load();
</script>
</body>
</html>
