<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Pointage Pro V2.2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap');
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --text: #1A1A18; --text2: #6B6B65;
    --green: #2D7D52; --green-bg: #E8F5EE; --red: #B53A2F; --red-bg: #FBE9E8;
    --border: rgba(0,0,0,0.08); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
  .screen { display: none; height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }
  .topbar { padding: 50px 24px 15px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .content { flex: 1; overflow-y: auto; padding: 20px; }
  .btn { padding: 16px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface); font-weight: 600; width: 100%; cursor: pointer; font-size: 16px; transition: 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-green { background: var(--green); color: white; border-color: var(--green); }
  .btn-red { background: var(--red); color: white; border-color: var(--red); }
  .emp-card { background: var(--surface); padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
  .avatar { width: 45px; height: 45px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
  .action-box { padding: 25px; border-radius: var(--radius); text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
  .big-time { font-family: 'DM Mono', monospace; font-size: 40px; margin: 10px 0; }
  .sync-indicator { font-size: 12px; color: var(--green); text-align: center; padding: 5px; background: #fff; display: none; border-bottom: 1px solid var(--border); }
  .loader { border: 2px solid #f3f3f3; border-top: 2px solid var(--green); border-radius: 50%; width: 14px; height: 14px; display: inline-block; animation: spin 1s linear infinite; margin-right: 5px; vertical-align: middle; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  
  /* Modal de confirmation */
  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; padding:20px; z-index:1000; }
  .modal-content { background:#fff; padding:24px; border-radius:20px; width:100%; max-width:400px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div id="sync-banner" class="sync-indicator"><div class="loader"></div> Synchro Google Sheets...</div>

<div id="screen-home" class="screen active">
  <div class="topbar">
    <div><h1>Pointage</h1><p id="h-date" style="font-size:12px; color:var(--text2)"></p></div>
    <button onclick="show('screen-admin')" style="border:none; background:none; font-size:24px">⚙️</button>
  </div>
  <div class="content" id="emp-list"></div>
</div>

<div id="screen-pointer" class="screen">
  <div class="topbar"><button onclick="show('screen-home')" style="border:none; background:none; font-size:18px">← Retour</button></div>
  <div class="content">
    <h2 id="p-name" style="margin-bottom:20px">Nom</h2>
    <div id="p-box" class="action-box">
      <p id="p-status">Chargement...</p>
      <div class="big-time" id="p-clock">00:00:00</div>
      <p id="p-total" style="font-size:14px; color:var(--text2)">Total semaine : --h--</p>
    </div>
    <button id="p-btn" class="btn" onclick="openConfirm()">Action</button>
  </div>
</div>

<div id="screen-admin" class="screen">
  <div class="topbar"><h1>Admin</h1><button onclick="show('screen-home')" style="border:none; background:none; font-size:20px">✕</button></div>
  <div class="content">
    <div style="margin-bottom:20px">
        <input type="text" id="new-emp" placeholder="Nom de l'employé" class="btn" style="margin-bottom:10px; text-align:left">
        <button class="btn btn-green" onclick="addEmp()">+ Ajouter l'employé</button>
    </div>
    <hr style="margin:20px 0; opacity:0.1">
    <div id="admin-list"></div>
  </div>
</div>

<!-- MODAL CONFIRMATION -->
<div id="modal-confirm" class="modal">
  <div class="modal-content">
    <h3 id="m-title" style="margin-bottom:10px">Confirmer ?</h3>
    <p id="m-desc" style="color:var(--text2); margin-bottom:20px">Voulez-vous enregistrer ce pointage ?</p>
    <button id="m-btn" class="btn btn-green" style="margin-bottom:10px" onclick="submitAction()">Oui, confirmer</button>
    <button class="btn" onclick="closeConfirm()">Annuler</button>
  </div>
</div>

<script>
const CONFIG = {
  URL: 'https://script.google.com/macros/s/AKfycbzLM0EuRt17oJCJssYQFx7qq3qFZii4SFEWbeuIA1-n0rBzsTg3UIakr3OQq8_jxApA/exec',
  KEY: 'pointage_v2_final'
};

let state = { emps: [], entries: [] };
let currentEmp = null;
let pendingType = '';

function load() {
  const local = localStorage.getItem(CONFIG.KEY);
  if (local) state = JSON.parse(local);
  syncFromCloud();
}

function save() { localStorage.setItem(CONFIG.KEY, JSON.stringify(state)); }

async function syncFromCloud() {
  document.getElementById('sync-banner').style.display = 'block';
  try {
    const res = await fetch(CONFIG.URL);
    const data = await res.json();
    if (data) {
      state.entries = data.map(d => ({
        empName: d.employe, 
        type: d.type === 'Arrivée' ? 'in' : 'out',
        ts: new Date(d.date + ' ' + d.heure).getTime()
      }));
      save();
    }
  } catch (e) { console.error("Erreur sync", e); }
  document.getElementById('sync-banner').style.display = 'none';
  renderHome();
}

function getWeekMinutes(empName) {
  const now = new Date();
  const startOfWeek = new Date(now.setDate(now.getDate() - (now.getDay() || 7) + 1)).setHours(0,0,0,0);
  const es = state.entries.filter(e => e.empName === empName && e.ts >= startOfWeek).sort((a,b)=>a.ts-b.ts);
  let total = 0, lastIn = null;
  es.forEach(e => {
    if(e.type === 'in') lastIn = e.ts;
    else if(lastIn) { total += (e.ts - lastIn); lastIn = null; }
  });
  return Math.floor(total / 60000);
}

function renderHome() {
  const list = document.getElementById('emp-list');
  document.getElementById('h-date').innerText = new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
  list.innerHTML = state.emps.map(e => {
    const isPresent = state.entries.filter(ent => ent.empName === e.name).slice(-1)[0]?.type === 'in';
    return `
      <div class="emp-card" onclick="openPointer('${e.id}')">
        <div class="avatar" style="background:${isPresent?'var(--green-bg)':'#eee'}; color:${isPresent?'var(--green)':'#666'}">
          ${e.name.charAt(0)}
        </div>
        <div style="flex:1">
          <div style="font-weight:600">${e.name}</div>
          <div style="font-size:12px; color:var(--text2)">${isPresent?'En poste':'Absent'}</div>
        </div>
      </div>`;
  }).join('');
}

function openPointer(id) {
  currentEmp = state.emps.find(e => e.id === id);
  document.getElementById('p-name').innerText = currentEmp.name;
  const last = state.entries.filter(e => e.empName === currentEmp.name).slice(-1)[0];
  const isPresent = last?.type === 'in';
  pendingType = isPresent ? 'out' : 'in';

  const box = document.getElementById('p-box');
  const btn = document.getElementById('p-btn');
  box.style.background = isPresent ? 'var(--red-bg)' : 'var(--green-bg)';
  document.getElementById('p-status').innerText = isPresent ? 'Travail en cours...' : 'Prêt à commencer';
  
  const mins = getWeekMinutes(currentEmp.name);
  document.getElementById('p-total').innerText = `Total semaine : ${Math.floor(mins/60)}h${(mins%60).toString().padStart(2,'0')}`;
  
  btn.innerText = isPresent ? 'Terminer ma journée' : 'Commencer ma journée';
  btn.className = isPresent ? 'btn btn-red' : 'btn btn-green';
  show('screen-pointer');
}

function openConfirm() {
  const isIn = pendingType === 'in';
  document.getElementById('m-title').innerText = isIn ? "Pointer l'Arrivée ?" : "Pointer le Départ ?";
  document.getElementById('m-btn').className = isIn ? "btn btn-green" : "btn btn-red";
  document.getElementById('modal-confirm').style.display = 'flex';
}

function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }

async function submitAction() {
  closeConfirm();
  const now = new Date();
  const last = state.entries.filter(e => e.empName === currentEmp.name).slice(-1)[0];
  
  const data = {
    date: now.toISOString().split('T')[0],
    employe: currentEmp.name,
    type: pendingType === 'in' ? 'Arrivée' : 'Départ',
    heure: now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0'),
    duree: 0 // Le Sheets calcule lui-même désormais
  };

  show('screen-home');
  fetch(CONFIG.URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
    .then(() => setTimeout(syncFromCloud, 1500));
}

function addEmp() {
  const name = document.getElementById('new-emp').value.trim();
  if (!name) return;
  state.emps.push({ id: 'e' + Date.now(), name });
  save();
  document.getElementById('new-emp').value = '';
  renderAdmin();
}

function renderAdmin() {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();
  const startOfWeek = new Date(now.setDate(now.getDate() - (now.getDay() || 7) + 1)).setHours(0,0,0,0);

  document.getElementById('admin-list').innerHTML = state.emps.map(e => {
    const allEntries = state.entries.filter(ent => ent.empName === e.name).sort((a,b) => a.ts - b.ts);

    const calc = (filterFn) => {
      let totalMins = 0, lastIn = null;
      allEntries.filter(filterFn).forEach(ent => {
        if(ent.type === 'in') lastIn = ent.ts;
        else if(lastIn) { totalMins += (ent.ts - lastIn); lastIn = null; }
      });
      const h = Math.floor(totalMins / 3600000);
      const m = Math.floor((totalMins % 3600000) / 60000);
      return `${h}h${m.toString().padStart(2, '0')}`;
    };

    const tJour = calc(ent => new Date(ent.ts).toISOString().split('T')[0] === todayStr);
    const tSemaine = calc(ent => ent.ts >= startOfWeek);
    const tMois = calc(ent => {
      const d = new Date(ent.ts);
      return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    });

    return `
      <div class="emp-card" style="display:block; padding: 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px">
          <div style="font-weight:600; font-size:18px">${e.name}</div>
          <button onclick="delEmp('${e.id}')" style="color:var(--red); border:none; background:none; font-size:12px; font-weight:600">Supprimer</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; text-align:center">
          <div>
            <div style="font-size:11px; color:var(--text2); text-transform:uppercase">Jour</div>
            <div style="font-weight:600">${tJour}</div>
          </div>
          <div style="border-left:1px solid #eee; border-right:1px solid #eee">
            <div style="font-size:11px; color:var(--text2); text-transform:uppercase">Semaine</div>
            <div style="font-weight:600">${tSemaine}</div>
          </div>
          <div>
            <div style="font-size:11px; color:var(--text2); text-transform:uppercase">Mois</div>
            <div style="font-weight:600; color:var(--green)">${tMois}</div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function delEmp(id) { 
  if(confirm("Supprimer cet employé de cet appareil ?")) {
    state.emps = state.emps.filter(e => e.id !== id);
    save(); renderAdmin(); 
  }
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-home') renderHome();
  if(id === 'screen-admin') renderAdmin();
}

setInterval(() => {
  document.getElementById('p-clock').innerText = new Date().toLocaleTimeString('fr-FR');
}, 1000);

load();
</script>
</body>
</html>
